# Stage 1 (MRI -> CT wavelet diffusion, trained on SynthRAD2023) config.
# Every hyperparameter the code reads lives here -- nothing is hardcoded in
# data/, models/, or training/. See PROJECT_NOTES.md for the reasoning behind these
# choices (architecture decision record).

seed: 42

data:
  # Confirmed exact Kaggle layout (2026-07-15): per-patient folders directly
  # under Task1/brain, each containing ct.nii, mask.nii, mr.nii. See
  # PROJECT_NOTES.md's "Kaggle dataset paths" section -- this is final, don't
  # re-derive it from the dataset root.
  synthrad_root: "/kaggle/input/datasets/fd7akxj65n5yjxwds/synthrad-2023/Task1/brain"
  region: null                       # path above is already scoped to Task1/brain; no filtering needed
  target_spacing: [1.0, 1.0, 1.0]     # mm, matches SynthRAD2023's official brain preprocessing
  ct_clip_range: [-1000.0, 3000.0]    # HU clip range before normalization to [-1, 1]
  match_brats_domain: true            # zero non-brain voxels in both MR and CT -- see PROJECT_NOTES.md domain-gap note
  crop_margin: 10                     # voxel margin around the brain-mask bounding box, matches SynthRAD2023 convention
  spatial_multiple: 16                # 2 (wavelet) * 2^3 (3 U-Net downsamples for channel_mult below) -- must match model.channel_mult length
  patch_size: null                    # e.g. [128, 128, 128] to train on random crops instead of full volumes; must be a multiple of spatial_multiple
  max_patients: null                  # cap the discovered patient count for a quick smoke test; null = use all. Also settable via train_stage1.py's --max_patients flag.
  train_val_split: 0.9
  num_workers: 4
  cache_dir: "/kaggle/working/synthrad_cache"   # preprocessed volumes cached here after first epoch; null to disable

model:
  # 2026-07-15 (round 4, speed pass): dropped from 64 -> 48 (39.2M params vs. 69.7M,
  # ~56% of original capacity -- a real quality tradeoff, not free) specifically to let
  # use_checkpoint go back to false below without re-OOMing. Sized against the one hard
  # data point available: at base_channels=64 with checkpointing OFF, the decoder OOM'd
  # short by exactly 1.14 GiB (13.55/14.56 GiB used). Channel count scales activation
  # memory ~linearly, and 64->48 is a 25% cut -- comfortable margin over that 1.14 GiB
  # gap, not a razor's-edge fit. If time/quality priorities shift back, restore 64 (and
  # use_checkpoint: true, already proven safe at 64) -- nothing else in the repo assumes
  # a specific base_channels value.
  base_channels: 48
  channel_mult: [1, 2, 4, 4]          # 3 downsamples -> spatial_multiple above must be 2 * 2^3 = 16
  num_res_blocks: 2
  # Self-attention runs at levels whose downsample factor (2^level, level 0 = right
  # after the wavelet transform) appears in this list. For channel_mult's 4 levels
  # the per-level factors are [1, 2, 4, 8] -- level 8 is the true bottleneck.
  # [4, 8] ("the two coarsest levels") was tried on 2026-07-15 and, on a real full-size
  # brain volume, still OOMs at level 4 (N=24,960 -> ~9.3 GiB dense attention matrix,
  # on top of ~7.85 GiB already used by higher-resolution blocks, on a 14.56 GiB T4).
  # [8]-only (bottleneck-only, current default) is the certain fix -- N is only a few
  # thousand there, trivial memory. See PROJECT_NOTES.md's "Known bugs fixed" for the full
  # story, including an unverified-on-GPU attempt at forcing the flash/memory-efficient
  # SDPA backend (models/unet3d.py) that might make [4, 8] safe again -- worth
  # re-testing once training is otherwise stable, since bottleneck-only attention is a
  # real (if likely small) quality tradeoff. If you change channel_mult's length,
  # recompute: the bottleneck factor is 2^(len(channel_mult)-1).
  attention_resolutions: [8]
  num_heads: 4
  num_groups: 32
  dropout: 0.0
  # Activation checkpointing (torch.utils.checkpoint): recomputes each ResBlock3D's
  # forward pass during backward instead of keeping every intermediate activation
  # around -- trades compute time for a large memory cut, especially at the
  # high-resolution decoder levels where post-skip-concat channel counts spike
  # (the 2026-07-15 GroupNorm OOM was there specifically; GroupNorm doesn't get
  # autocast's fp16 memory savings, so this is the lever that actually addresses it).
  #
  # 2026-07-15 (round 5, deadline pass): confirmed WORKING on Kaggle at
  # base_channels=48 with use_checkpoint=true (50/100-step smoke test, no OOM,
  # 15.34s/accumulated-step). Kept ON here -- it's the confirmed-safe setting;
  # the real speed win tonight comes from training.grad_accum_steps below
  # instead (a change needing no further GPU verification at all, unlike
  # anything here). GUARANTEED-SAFE FALLBACK if memory pressure ever comes
  # back: this combination (checkpoint=true, base_channels=48) is what to
  # fall back to first.
  #
  # OPTIONAL / UNVERIFIED experiment, only if there's time to spare: instead
  # of `true` (checkpoint every level), use_checkpoint also accepts a list of
  # resolution factors, same convention as attention_resolutions above, e.g.
  # `use_checkpoint: [1, 2]` checkpoints ONLY the two finest levels (where the
  # original OOM actually happened) and skips it at the cheap coarse/bottleneck
  # levels (factors 4, 8) that never needed the memory tradeoff -- profiling
  # showed backward (checkpoint recompute) dominant at 64% of step time, and
  # this could cut some of that without reopening the OOM, since it only
  # *removes* checkpointing from levels that were never the memory problem.
  # Verified numerically identical to full checkpointing on CPU (same
  # gradients), but the actual time savings on a real T4 is unverified --
  # test with `--max_steps 20` first before trusting it with the full run.
  use_checkpoint: true

diffusion:
  # timesteps: 1000 -> 250 (round 5, deadline pass). With a training budget of a
  # few thousand steps total, T=1000 means most individual noise levels get only
  # a handful of gradient updates each (steps spread thin across 1000 buckets).
  # Dropping to 250 gives ~4x denser coverage per noise level for the same total
  # step count -- doesn't change wall-clock speed at all (same architecture, same
  # compute per step), just changes what's being learned to fit the available
  # step budget. Not needed once total_steps is back in the tens of thousands+.
  timesteps: 250
  noise_schedule: "linear"
  beta_start: 0.0001
  beta_end: 0.02
  predict: "epsilon"
  # 2026-07-16 (round 6, continued-training pass): LLL (coarse structure)
  # weighted 3x over the 7 detail subbands. First 5500 steps (equal weights)
  # produced a smooth gray texture with faint scattered artifacts but no
  # visible brain shape -- consistent with a wavelet-domain model that's
  # learned rough intensity statistics (LLL, low-dimensional, converges
  # fast) but not yet the conditioning->shape correlation or clean detail
  # subbands (higher-dimensional, needs more steps). With only a few more
  # thousand steps available before the deadline, biasing gradient signal
  # toward LLL trades some detail-subband quality for a better chance of
  # visible brain shape emerging in the time left -- the actual goal
  # tonight. Revert to equal weights for a real full training run.
  subband_loss_weights: [3, 1, 1, 1, 1, 1, 1, 1]   # LLL, LLH, LHL, LHH, HLL, HLH, HHL, HHH
  ddim_steps: 30                      # dropped from 100 -> 30 (round 5): faster Stage 2 generation to cover more BraTS patients in the remaining time budget; run_stage2_brats.py's --num_steps overrides this per-run without editing the file
  ddim_eta: 0.0                       # 0 = deterministic DDIM (fast); 1 = stochastic, approximates ancestral DDPM

training:
  batch_size: 1                       # full 3D volumes; increase only if patch_size is set and VRAM allows
  # grad_accum_steps: 4 -> 1 (round 5, deadline pass). THE speed lever for
  # tonight: this doesn't touch per-microbatch memory at all (already proven
  # safe at grad_accum=4, so grad_accum=1 can only use the same or less peak
  # memory -- zero additional OOM risk, no GPU retest needed) but gives ~3.8x
  # more optimizer weight updates for the same wall-clock training time, since
  # optimizer.step() now runs every microbatch instead of every 4th. Matches
  # cwdm's own reference config, which uses no gradient accumulation at all
  # (effective batch=1) successfully. The tradeoff is noisier per-step gradients
  # (batch=1 instead of averaged batch=4) -- already guarded by grad_clip_norm
  # and AMP's adaptive GradScaler below, both already in place. Revert to 4 (or
  # higher) once back on a multi-day training budget, for smoother gradients.
  grad_accum_steps: 1
  lr: 0.0001
  weight_decay: 0.0
  optimizer: "adamw"
  lr_schedule: "cosine"                # constant | cosine | linear_warmup_cosine
  # warmup_steps/total_steps (round 5): sized to the real ~4.0s/step measured
  # after grad_accum_steps=1 (data+fwd+bwd per microbatch + opt overhead), for a
  # ~6.5 hour training window. This is a PLANNING estimate, not a hard target --
  # training is checkpointed every checkpoint_interval steps regardless, so it's
  # fine (and expected) to interrupt before reaching total_steps once the
  # training time budget is up and move on to Stage 2 with whatever checkpoint
  # exists then. Restore to 200000 (and a longer warmup) for a real full run.
  warmup_steps: 150
  # total_steps: 5500 -> 9000 (round 6): the completed 5500-step run finished
  # its cosine schedule (LR annealed to 0); bumping total_steps and resuming
  # from the existing checkpoint correctly REOPENS the cosine schedule at a
  # useful LR rather than staying stuck near 0 (verified locally: resuming
  # with a larger total_steps after a completed short schedule reopens LR
  # from ~peak and re-anneals, doesn't need any other code change). 9000 is
  # sized to roughly the remaining time budget at the measured ~4s/step --
  # same as before, a planning estimate: stop whenever the time budget is
  # up, checkpoint_interval=250 means there's always a recent save.
  total_steps: 9000
  # ema_decay: 0.9999 -> 0.995 (round 6): lowers the EMA time constant from
  # ~10,000 steps to ~200 steps. The existing checkpoint's EMA state is still
  # contaminated (see PROJECT_NOTES.md's "Known bugs fixed" -- 57.7% random-init
  # after 5500 steps at the old decay), but continuing at this lower decay
  # for even a few hundred more steps lets EMA actually converge and become
  # usable again, in case there's time to compare EMA vs. raw weights at the
  # end. Stage 2 still defaults to use_ema:false regardless, so this is a
  # safety net, not something the current workflow depends on.
  ema_decay: 0.995
  amp: true                            # mixed precision -- roughly halves VRAM use and speeds up training on Kaggle GPUs
  grad_clip_norm: 1.0
  log_interval: 25                     # steps between progress-log-file writes
  val_interval: 250                    # round 5: shortened from 1000 to match the smaller total_steps -- still get periodic readouts within the run
  val_batches: 5                       # number of val batches averaged per validation check
  checkpoint_interval: 250             # round 5: shortened from 1000 -- ~22 checkpoints across the training window, so interrupting at any point (deadline permitting) still has a recent checkpoint to run Stage 2 against
  keep_last_n_checkpoints: 3           # older numbered checkpoints are pruned; ckpt_latest.pt always kept
  log_file: "/kaggle/working/logs/stage1_train_log.csv"

checkpoint:
  working_dir: "/kaggle/working/checkpoints/stage1_synthrad"
  # Populate this on a fresh Kaggle session with the mounted path of a
  # previous session's saved Output (Add Input -> Notebook Output Files).
  # See PROJECT_NOTES.md's "What you need to do on Kaggle's side" section.
  extra_resume_dirs: []

kaggle:
  note: >
    Checkpoints write to checkpoint.working_dir under /kaggle/working, which
    Kaggle's "Save Version" persists as a Kaggle Output. To resume in a new
    session: Save Version on the old one, then Add Input -> Notebook Output
    Files on the new one, and add the mounted checkpoints path to
    checkpoint.extra_resume_dirs above.
