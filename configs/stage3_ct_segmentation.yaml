# Stage 3 (CT -> binary tumor segmentation) config. Trains ONLY on the
# synthetic CT + tumor mask pairs Stage 2 generated (data.synthetic_ct_root)
# -- the Jordan hospital dataset (data.jordan_ct_root / jordan_mask_root)
# is external validation only, read by inference/validate_jordan_segmentation.py,
# and is never touched by training/train_stage3_segmentation.py. See
# PROJECT_NOTES.md's Stage 3 section for the full reasoning and the known
# limitations of the Jordan comparison.

seed: 42

data:
  # Stage 2's output dataset, re-uploaded as its own Kaggle input. Note the
  # unusually deep path -- this is Kaggle's own nesting from how the dataset
  # was originally exported, not something to "fix"; data/loaders_synthetic_ct.py
  # just needs the exact path to the directory whose immediate children are
  # per-patient folders.
  synthetic_ct_root: "/kaggle/input/datasets/sumayarahmanmeherin/annoted-sct/kaggle/input/notebooks/sumayarahmanmeherin/mri-to-ct/synthetic_ct_dataset_regression"
  # Jordan University Hospital external validation set (20 patients, CT and
  # mask as separate flat directories of RGB DICOM slices) -- read only by
  # inference/validate_jordan_segmentation.py, listed here so both the
  # training config and the validation script share one source of truth.
  jordan_ct_root: "/kaggle/input/datasets/sumayarahmanmeherin/annoted-20-ct"
  jordan_mask_root: "/kaggle/input/datasets/sumayarahmanmeherin/mask-data-20"

  ct_clip_range: [-1000.0, 3000.0]     # same HU clip range as Stage 1 -- synthetic CT was generated under this same convention
  crop_margin: 10
  spatial_multiple: 16                 # 2^4 (4 U-Net downsamples for model.channel_mult below)
  patch_size: [96, 96, 64]             # training patches; must each be a multiple of spatial_multiple
  # Fraction of training patches deliberately centered on a tumor voxel instead
  # of a uniform-random location (data/preprocessing.py's foreground_biased_patch_crop)
  # -- a tumor is a tiny fraction of a whole brain volume, so pure random cropping
  # would mostly yield empty-mask patches and a weak Dice gradient signal.
  foreground_prob: 0.5
  max_patients: null
  train_val_split: 0.9                 # patient-level split, no leakage -- same algorithm as Stage 1
  num_workers: 4
  # Training-time augmentation, added 2026-07-24 for tonight's retrain -- applied to TRAIN
  # patches only (never validation, which stays exactly the real preprocessed volume), to
  # improve generalization to the 20-patient Jordan external cohort and reduce overfitting to
  # the 331 synthetic-CT training patients. See data/preprocessing.py's augment_ct_mask_patch.
  augment: true
  flip_prob: 0.5                       # per-axis independent flip probability (up to 3 axes)
  rot90_prob: 0.5                      # probability of one random 90-degree rotation about a random axis pair
  intensity_jitter_std: 0.05           # CT-only random scale+shift, std as a fraction of the [-1,1] normalized range

model:
  base_channels: 32                     # reverted from 64 back to 32 2026-07-24, same night -- the base_channels=64
                                         # capacity experiment is abandoned for tonight. Two real attempts both hit
                                         # non-finite loss (lr=0.0002: step ~1836, escalating/"continuous"; lr=0.0001,
                                         # confirmed via the actual log after a stale-config false start: step 618,
                                         # same escalating pattern) -- halving the LR did NOT fix it, so the
                                         # instability is tied to base_channels=64 itself, not just LR magnitude.
                                         # With little time left tonight, reverting to the ONE combination with a
                                         # full, clean, zero-NaN 20000-step track record (base_channels=32,
                                         # lr=0.0002) rather than continuing to chase this down. NOTE: this is a
                                         # from-scratch restart -- neither base_channels=64 checkpoint from tonight
                                         # is loadable here, since base_channels changes every layer's tensor shapes.
                                         # The capacity hypothesis itself remains untested, not disproven -- it was
                                         # never given a stable run to actually evaluate.
  channel_mult: [1, 2, 4, 8]
  num_groups: 8

training:
  batch_size: 2
  lr: 0.0002                            # reverted back to 0.0002 alongside base_channels=32 above -- this is the
                                         # exact combination that ran the full, clean 20000 steps with zero NaN
                                         # issues (2026-07-19 through 22). The 0.0001 halving was specifically to
                                         # compensate for base_channels=64's instability, which no longer applies
                                         # now that capacity is reverted.
  weight_decay: 0.00001                 # added 2026-07-22, alongside the nan-frequency investigation -- was 0.0
                                         # (no regularization at all) for every prior Stage 3 run; a small L2 term
                                         # gives long training runs something to keep weight/activation magnitude
                                         # bounded over thousands of steps, a plausible contributor to instability
                                         # that builds up over time rather than appearing immediately
  lr_schedule: "cosine"
  warmup_steps: 200
  total_steps: 20000                    # restored from 12000 back to 20000 2026-07-24, alongside the base_channels
                                         # revert -- 12000 was calibrated for base_channels=64's slower per-step
                                         # compute, which no longer applies at base_channels=32 (the exact figure
                                         # that already completed cleanly once tonight's earlier changes started).
                                         # Given how much of tonight's window is already spent on the abandoned
                                         # capacity experiment, check your REMAINING real time now and override
                                         # with --max_steps if 20000 won't fit -- don't assume the original budget
                                         # is still available.
  # Real Kaggle run (2026-07-19, 20000 steps) confirmed Dice+BCE ("dice_bce", the
  # original default) collapses toward predicting an essentially empty mask under
  # this project's severe class imbalance -- external Jordan validation came back
  # ~0.0005-0.013 Dice, uniformly near-zero. "tversky" and "focal" were both added
  # as fixes; the real training since has been running "focal" (with focal_alpha
  # corrected below), which is why the default here now matches that, not because
  # tversky performed worse -- tversky/focal_tversky are still fully supported,
  # untested-on-real-data alternatives if focal also plateaus. See
  # PROJECT_NOTES.md's Stage 3 investigation section for the full evidence.
  loss_type: "focal"                     # dice_bce | tversky | focal_tversky | focal
  bce_weight: 1.0                       # only used when loss_type: dice_bce
  tversky_alpha: 0.3                    # false-positive weight (used by tversky / focal_tversky)
  tversky_beta: 0.7                     # false-negative weight -- higher than alpha, penalizes missed tumor more
  focal_gamma: 2.0                      # reverted back to 2.0 2026-07-22. Was lowered to 1.0 on 2026-07-19 to
                                         # address a val-dice plateau (see PROJECT_NOTES.md's plateau follow-up),
                                         # but the gamma=1.0 scratch run never showed a clean transition to a
                                         # continuous, improving dice/loss trend through step 6557 either, AND
                                         # separately hit escalating loss=nan from step ~4788 onward -- since an
                                         # increasing fraction of steps in that window were skipped (no weight
                                         # update at all), this run doesn't cleanly isolate gamma's effect on its
                                         # own; reverting is a pragmatic choice (nearest configuration with any
                                         # track record, restarting for the nan issue regardless) rather than a
                                         # rigorously confirmed one -- see PROJECT_NOTES.md's stability follow-up
                                         # for the full, honest reasoning.
  focal_alpha: 0.75                     # reverted from 0.6 back to 0.75 on 2026-07-24, per explicit instruction
                                         # to keep tonight's retrain on "the only configuration verified to
                                         # converge cleanly so far" given the time constraint -- the 0.6 change
                                         # (2026-07-23, addressing visually-confirmed over-segmentation) was never
                                         # conclusively evaluated end-to-end (its 30000-step run ended with an
                                         # ambiguous single low val-dice data point and no full trend was ever
                                         # provided to confirm or rule out a regression), so it is NOT "verified"
                                         # in the same sense 0.75 is (a full, real 20000-step run with a
                                         # documented, genuinely-rising dice trend, mean 0.2352 / max 0.3196).
                                         # Weights the RARE class (tumor, target=1) via
                                         # alpha_t=alpha*target+(1-alpha)*(1-target); known to over-segment
                                         # somewhat at this value (see the 2026-07-23 over-segmentation note in
                                         # PROJECT_NOTES.md) -- accepted as a known, documented tradeoff for
                                         # tonight in exchange for a known-converging starting point; the
                                         # optional post-processing threshold search added tonight
                                         # (inference/postprocessing.py) is one way to partially compensate for
                                         # this at evaluation time without retraining.
  amp: true
  grad_clip_norm: 1.0
  ema_decay: 0.999                      # EMA state saved for reference only -- inference/validate_jordan_segmentation.py always evaluates RAW weights, same anti-contamination pattern as Stage 1
  log_interval: 25
  val_interval: 1000
  val_max_patients: 5                   # cap on the periodic in-training validation pass (full-volume, so this stays cheap)
  checkpoint_interval: 1000
  keep_last_n_checkpoints: 3
  log_file: "/kaggle/working/logs/stage3_segmentation_log.csv"

checkpoint:
  working_dir: "/kaggle/working/checkpoints/stage3_segmentation"   # separate from Stage 1/2's checkpoint dirs -- never collides
  extra_resume_dirs: []
